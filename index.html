<script>

const S={url:'',branche:'',anfragen:'',sichtbarkeit:'',alter:'',psData:null,psDone:false,step:0};
const STEPS=5;

function fetchPS(url){
  const api='https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url='+encodeURIComponent(url)+'&strategy=mobile';
  const ctrl=new AbortController();
  setTimeout(()=>ctrl.abort(),22000);
  fetch(api,{signal:ctrl.signal})
    .then(r=>r.json())
    .then(d=>{
      const lr=d.lighthouseResult;
      S.psData={
        perf:lr?.categories?.performance?.score??0.5,
        seo:lr?.categories?.seo?.score??0.5,
        hasMeta:lr?.audits?.['meta-description']?.score===1,
        hasTitle:lr?.audits?.['document-title']?.score===1,
        crawlable:lr?.audits?.['is-crawlable']?.score===1,
        hasSchema:lr?.audits?.['structured-data']?.score===1,
        viewport:lr?.audits?.['viewport']?.score===1,
      };
    })
    .catch(()=>{S.psData={perf:.5,seo:.5,hasMeta:null,hasTitle:null,crawlable:null,hasSchema:null,viewport:null};})
    .finally(()=>{S.psDone=true;});
}

function calcScore(){
  const perf=S.psData?.perf??0.5,seo=S.psData?.seo??0.5;
  const perfPts=Math.round(perf*20),seoPts=Math.round(seo*18);
  const anfrMap={'0':0,'1-5':14,'5-10':28,'10-20':40,'20-50':52,'50+':62};
  const anfrPts=anfrMap[S.anfragen]??15;
  const sichtMap={seite1:18,seite2:10,kaum:3,weiss:6};
  const sichtPts=sichtMap[S.sichtbarkeit]??6;
  const agePen=S.alter==='alt5'?10:S.alter==='alt3'?4:0;
  const total=Math.max(5,Math.min(95,perfPts+seoPts+Math.round(anfrPts*.62)+sichtPts-agePen));
  const factors={
    ladezeit:Math.round(perf*100),
    mobil:Math.round(perf*100),
    seo:Math.round(seo*100),
    sichtbarkeit:S.sichtbarkeit==='seite1'?95:S.sichtbarkeit==='seite2'?55:S.sichtbarkeit==='kaum'?15:35,
    anfragen:Math.min(100,Math.round(anfrPts*1.6)),
    potenzial:total
  };
  let leakMin,leakMax;
  if(total>=78){leakMin=10;leakMax=28;}
  else if(total>=62){leakMin=28;leakMax=45;}
  else if(total>=46){leakMin=45;leakMax=62;}
  else if(total>=30){leakMin=62;leakMax=76;}
  else{leakMin=76;leakMax=90;}
  return{total,factors,leakMin,leakMax};
}

function getIssues(factors){
  const issues=[];
  if(factors.ladezeit<60)issues.push({title:'Deine Website l\u00e4dt zu langsam',desc:'Viele Interessenten schauen sich deine Website auf dem Handy an. Wenn sie zu lange braucht, klicken die meisten einfach weg \u2013 bevor sie gelesen haben, was du anbietest.'});
  if(S.anfragen==='0')issues.push({title:'Die Website bringt aktuell keine Anfragen rein',desc:'Deine Seite hat Besucher, aber nichts auf ihr gibt ihnen einen Grund, dich zu kontaktieren. Das ist kein Pech \u2013 das ist ein l\u00f6sbares Problem.'});
  else if(S.anfragen==='1-5')issues.push({title:'Kaum Anfragen f\u00fcr dein Potenzial',desc:'Bei 1\u20135 Anfragen im Monat geht ein Gro\u00dfteil der Besucher ohne Reaktion. Das passiert, wenn der Weg zur Kontaktaufnahme nicht klar genug ist oder das Vertrauen fehlt.'});
  if(factors.seo<55)issues.push({title:'Deine Website ist bei Google kaum sichtbar',desc:'Wenn Interessenten bei Google nach deiner Leistung suchen, taucht deine Seite nicht auf \u2013 oder erst weit hinten. Das bedeutet: Neukunden, die aktiv suchen, landen bei der Konkurrenz.'});
  if(S.sichtbarkeit==='kaum'||S.sichtbarkeit==='weiss')issues.push({title:'Dein Betrieb wird online nicht gut gefunden',desc:'Wer heute einen Handwerker oder Dienstleister sucht, googelt. Wenn du dabei nicht auftauchst, verlierst du Kunden, bevor du \u00fcberhaupt wei\u00dft, dass sie gesucht haben.'});
  if(S.alter==='alt5')issues.push({title:'Dein Webauftritt wirkt nicht mehr zeitgem\u00e4\u00df',desc:'Eine \u00fcber 5 Jahre alte Website sendet ein unbewusstes Signal: Stillstand. Neue Kunden schauen, ob ein Betrieb modern aufgestellt ist \u2013 bevor sie anrufen.'});
  else if(S.alter==='alt3')issues.push({title:'Deine Website entspricht nicht mehr dem heutigen Standard',desc:'Was vor 3\u20135 Jahren gut aussah, wirkt heute oft un\u00fcbersichtlich und nicht vertrauensw\u00fcrdig.'});
  if(!issues.length)issues.push({title:'Noch ungenutztes Potenzial',desc:'Deine Website ist solide aufgestellt \u2013 aber selbst gute Seiten verlieren Anfragen durch kleine Stellschrauben bei Vertrauen, Struktur und Nutzerf\u00fchrung.'});
  return issues.slice(0,3);
}

function getScoreColor(s){return s>=68?'#5EC47A':s>=42?'#E09030':'#E05252';}

function openFunnel(preUrl){S.step=0;if(preUrl)S.url=preUrl;document.getElementById('funnel-ov').classList.remove('hidden');document.getElementById('landing').style.display='none';renderStep();}
function closeFunnel(){document.getElementById('funnel-ov').classList.add('hidden');document.getElementById('landing').style.display='';}
function startFromHero(){const v=document.getElementById('hero-url').value.trim();if(v)S.url=v.startsWith('http')?v:'https://'+v;openFunnel(S.url);}
function funnelBack(){if(S.step>0){S.step--;renderStep();}else closeFunnel();}
function updateProgress(){const pct=Math.round((S.step/STEPS)*100);document.getElementById('f-prog').style.width=pct+'%';document.getElementById('f-step-lbl').textContent='Schritt '+(S.step+1)+' von '+STEPS;document.getElementById('f-back-btn').style.opacity=S.step===0?'0.4':'1';}
function renderStep(){updateProgress();const c=document.getElementById('f-step-content');if(S.step===0)c.innerHTML=stepUrl();else if(S.step===1)c.innerHTML=stepBranche();else if(S.step===2)c.innerHTML=stepAnfragen();else if(S.step===3)c.innerHTML=stepSichtbarkeit();else if(S.step===4)c.innerHTML=stepAlter();c.style.animation='none';c.offsetHeight;c.style.animation='';}

function stepUrl(){return '<p class="f-qlbl">Schritt 1 von 5</p><h2 class="f-qh">Welche Website soll analysiert werden?</h2><p class="f-qs">Einfach die Adresse eingeben \u2013 wir schauen uns technische Leistung und Google-Sichtbarkeit an.</p><input class="inp-f" id="url-inp" type="text" placeholder="https://deine-website.de" value="'+S.url+'" autocomplete="off" onkeydown="if(event.key===\'Enter\')submitUrl()"><p class="f-err hidden" id="url-err">Bitte gib eine g\u00fcltige Webadresse ein.</p><div class="f-nav"><button class="gbtn" onclick="submitUrl()" style="width:100%">Weiter \u2192</button></div>';}
function submitUrl(){let v=document.getElementById('url-inp').value.trim();if(!v){document.getElementById('url-err').classList.remove('hidden');return;}if(!v.startsWith('http'))v='https://'+v;S.url=v;document.getElementById('url-err').classList.add('hidden');fetchPS(v);S.step=1;renderStep();}

function stepBranche(){
  const opts=[['Handwerk & Bau','handwerk'],['Gesundheit & Pflege','gesundheit'],['Beratung & Coaching','beratung'],['IT & Digitales','it'],['Gastronomie','gastro'],['Sonstiges','sonstiges']];
  return '<p class="f-qlbl">Schritt 2 von 5</p><h2 class="f-qh">In welchem Bereich bist du t\u00e4tig?</h2><p class="f-qs">Damit k\u00f6nnen wir die Ergebnisse besser einordnen.</p><div class="opts-grid">'+opts.map(([lbl,val])=>'<div class="opt-c'+(S.branche===val?' sel':'')+'" onclick="selectBranche(\''+val+'\')"><span>'+lbl+'</span></div>').join('')+'</div>';
}
function selectBranche(v){S.branche=v;S.step=2;renderStep();}

function stepAnfragen(){
  const opts=[['0','Keine','Ich bekomme keine Anfragen \u00fcber die Website'],['1-5','1 \u2013 5','Vereinzelt, aber selten'],['5-10','5 \u2013 10','Manchmal, ausbauf\u00e4hig'],['10-20','10 \u2013 20','Regelm\u00e4\u00dfig'],['20-50','20 \u2013 50','Gut, aber mehr w\u00e4re besser'],['50+','50+','Sehr viele, l\u00e4uft gut']];
  return '<p class="f-qlbl">Schritt 3 von 5</p><h2 class="f-qh">Wie viele Anfragen kommen monatlich \u00fcber deine Website?</h2><p class="f-qs">Gemeint sind Anrufe, Nachrichten oder Kontaktformulare direkt \u00fcber deine Website.</p><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+opts.map(([val,num,desc])=>'<div class="opt-c'+(S.anfragen===val?' sel':'')+'" onclick="selectAnfragen(\''+val+'\')" style="text-align:left;flex-direction:row;gap:12px;padding:14px 16px"><span style="font-size:17px;font-weight:800;min-width:44px;color:var(--gm)">'+num+'</span><span style="font-size:12px;color:inherit">'+desc+'</span></div>').join('')+'</div>';
}
function selectAnfragen(v){S.anfragen=v;S.step=3;renderStep();}

function stepSichtbarkeit(){
  const opts=[['seite1','Ja, auf Seite 1','Ich bin gut zu finden'],['seite2','Auf Seite 2\u20133','Man findet mich, aber selten'],['kaum','Kaum sichtbar','Ich tauche kaum auf'],['weiss','Wei\u00df ich nicht','Ich habe das nie gepr\u00fcft']];
  return '<p class="f-qlbl">Schritt 4 von 5</p><h2 class="f-qh">Wenn jemand bei Google nach deiner Leistung sucht \u2013 erscheinst du?</h2><p class="f-qs">Z.B. \u201eElektriker M\u00fcnchen\u201c oder \u201eSteuerberater Hamburg\u201c \u2013 wie sichtbar bist du dabei?</p><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">'+opts.map(([val,num,desc])=>'<div class="opt-c'+(S.sichtbarkeit===val?' sel':'')+'" onclick="selectSichtbarkeit(\''+val+'\')" style="text-align:left;flex-direction:row;gap:12px;padding:14px 16px"><span style="font-size:14px;font-weight:700;min-width:110px;color:var(--gm)">'+num+'</span><span style="font-size:12px;color:inherit">'+desc+'</span></div>').join('')+'</div>';
}
function selectSichtbarkeit(v){S.sichtbarkeit=v;S.step=4;renderStep();}

function stepAlter(){
  const opts=[['Weniger als 1 Jahr','jung'],['1 \u2013 3 Jahre','mittel'],['3 \u2013 5 Jahre','alt3'],['\u00c4lter als 5 Jahre','alt5']];
  return '<p class="f-qlbl">Schritt 5 von 5</p><h2 class="f-qh">Wie alt ist deine aktuelle Website?</h2><p class="f-qs">\u00c4ltere Websites entsprechen oft nicht mehr dem heutigen Standard \u2013 das beeinflusst Ladezeit, Darstellung und Google-Ranking.</p><div class="opts-grid">'+opts.map(([lbl,val])=>'<div class="opt-c'+(S.alter===val?' sel':'')+'" onclick="selectAlter(\''+val+'\')" style="padding:18px 14px"><span style="font-size:15px;font-weight:600">'+lbl+'</span></div>').join('')+'</div>';
}
function selectAlter(v){S.alter=v;startLoading();}

function startLoading(){
  document.getElementById('funnel-ov').classList.add('hidden');
  document.getElementById('loading-ov').classList.remove('hidden');
  document.getElementById('ld-url').textContent=S.url;
  const labels=['Ladegeschwindigkeit wird gemessen\u2026','Darstellung auf dem Handy wird gepr\u00fcft\u2026','Google-Sichtbarkeit wird analysiert\u2026','SEO-Faktoren werden ausgewertet\u2026','Anfragepotenzial wird berechnet\u2026','Gesamtbewertung wird erstellt\u2026'];
  const wrap=document.getElementById('bars-wrap');
  wrap.innerHTML=labels.map((lbl,i)=>'<div class="bar-row" id="brow-'+i+'" style="opacity:.2"><div class="bar-info"><span class="bar-lbl">'+lbl+'</span><span class="bar-pct" id="bpct-'+i+'">-</span></div><div class="bar-track"><div class="bar-fill" id="bfill-'+i+'"></div></div></div>').join('');
  const start=Date.now(),MIN=7200;
  function runBar(idx,done){
    if(idx>=labels.length){done();return;}
    const row=document.getElementById('brow-'+idx),fill=document.getElementById('bfill-'+idx),pct=document.getElementById('bpct-'+idx);
    row.style.opacity='1';pct.textContent='0%';
    const dur=700+Math.random()*500;let t0=null;
    const run=(now)=>{if(!t0)t0=now;const p=Math.min((now-t0)/dur,1),c=Math.round(p*100);fill.style.width=c+'%';fill.style.backgroundImage='linear-gradient(90deg,#1A5C30,#5EC47A)';pct.textContent=c+'%';if(p<1)requestAnimationFrame(run);else{pct.textContent='100%';setTimeout(()=>runBar(idx+1,done),160);}};
    requestAnimationFrame(run);
  }
  runBar(0,()=>{const wait=Math.max(0,MIN-(Date.now()-start));setTimeout(()=>{if(S.psDone)showResults(calcScore());else{const chk=setInterval(()=>{if(S.psDone){clearInterval(chk);showResults(calcScore());}},250);}},wait);});
}

function showResults(result){
  document.getElementById('loading-ov').classList.add('hidden');
  document.getElementById('results-ov').classList.remove('hidden');
  const{total,factors,leakMin,leakMax}=result;
  const issues=getIssues(factors);
  const col=getScoreColor(total);
  const circ=(2*Math.PI*50).toFixed(1),fillD=(total/100*2*Math.PI*50).toFixed(1);
  const seoAudits=[];
  if(S.psData?.hasMeta===false)seoAudits.push('Beschreibungstext f\u00fcr Google fehlt');
  if(S.psData?.hasTitle===false)seoAudits.push('Seitentitel nicht optimiert');
  if(S.psData?.crawlable===false)seoAudits.push('Seite f\u00fcr Google nicht vollst\u00e4ndig erreichbar');
  if(S.psData?.hasSchema===false)seoAudits.push('Kein strukturiertes Datenschema vorhanden');
  if(S.psData?.viewport===false)seoAudits.push('Handy-Darstellung nicht korrekt eingestellt');
  const seoHtml=seoAudits.length?'<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'+seoAudits.map(a=>'<div style="font-size:12px;color:var(--tx2);display:flex;gap:7px"><span style="color:var(--red);flex-shrink:0">x</span>'+a+'</div>').join('')+'</div>':'<div style="font-size:12px;color:var(--grn);margin-top:8px">Technische SEO-Grundlagen sind vorhanden</div>';
  const fRows=[['Ladegeschwindigkeit',factors.ladezeit],['Handy-Darstellung',factors.mobil],['SEO-Score (Google)',factors.seo],['Sichtbarkeit lokal',factors.sichtbarkeit],['Anfragen aktuell',factors.anfragen],['Gesamtpotenzial',factors.potenzial]].map(([lbl,pct])=>{const c=getScoreColor(pct),g=pct>=68?'linear-gradient(90deg,#1A5C30,#5EC47A)':pct>=42?'linear-gradient(90deg,#8B5A10,#E09030)':'linear-gradient(90deg,#7A1A1A,#E05252)';return '<div class="fmini-row"><span class="fmini-lbl">'+lbl+'</span><div class="fmini-track"><div class="fmini-fill" style="width:'+pct+'%;background-image:'+g+'"></div></div><span class="fmini-pct" style="color:'+c+'">'+pct+'%</span></div>';}).join('');
  const issueHtml=issues.map((iss,idx)=>'<div class="issue-item"><div class="i-rank">'+(idx+1)+'</div><div><div class="i-t">'+iss.title+'</div><div class="i-d">'+iss.desc+'</div></div></div>').join('');
  const recs=[{icon:'\u2191',title:'Den ersten Eindruck deiner Website \u00fcberarbeiten',desc:'Der wichtigste Bereich ist das, was man sieht ohne zu scrollen. Wenn dort nicht sofort klar ist, was du anbietest und wie man dich erreicht, geht die Mehrheit ohne Reaktion weg.'},{icon:'S',title:'Bei Google besser gefunden werden',desc:'Wer heute einen Handwerker oder Dienstleister sucht, googelt. Mit einer SEO-optimierten Website und einem gepflegten Google Business Profil bist du genau dann sichtbar, wenn jemand aktiv sucht.'},{icon:'?',title:'Die dritte \u2013 und oft st\u00e4rkste \u2013 Ma\u00dfnahme\u2026',desc:'Diese zeigen wir dir im pers\u00f6nlichen Gespr\u00e4ch. Sie h\u00e4ngt von deiner konkreten Situation ab.'}];
  const recsHtml=recs.map((r,i)=>'<div class="rec-item'+(i===2?' rec-blur':'')+'" ><div class="rec-ico">'+r.icon+'</div><div><div class="rec-t">'+r.title+'</div><div class="rec-d">'+r.desc+'</div></div></div>').join('');
  document.getElementById('results-content').innerHTML=
    '<div class="res-top-logo">GoldenWeb &ndash; Website &amp; SEO Analyse</div>'+
    '<div class="score-wrap"><svg class="score-svg" viewBox="0 0 120 120" style="overflow:visible"><circle class="sc-track" cx="60" cy="60" r="50"/><circle class="sc-fill" cx="60" cy="60" r="50" stroke="'+col+'" stroke-dasharray="0 '+circ+'" id="sc-fill-el" transform="rotate(-90 60 60)"/><text class="sc-num" x="60" y="57">'+total+'</text><text class="sc-lbl" x="60" y="72">von 100</text></svg></div>'+
    '<div class="leak-big">Gesch&auml;tzter Anfrageverlust: '+leakMin+' &ndash; '+leakMax+' %</div>'+
    '<div class="leak-sub">Von 100 Besuchern nehmen sch&auml;tzungsweise nur '+(100-leakMax)+'&ndash;'+(100-leakMin)+' Kontakt auf.<br>Der Rest verl&auml;sst deine Seite ohne anzurufen.</div>'+
    '<div class="r-panel"><div class="r-ph red">Wo deine Website aktuell Anfragen und Sichtbarkeit verliert</div>'+issueHtml+'</div>'+
    '<div class="r-panel"><div class="r-ph gold">SEO &amp; Google-Sichtbarkeit im Detail</div><div style="padding:14px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;color:var(--tx2)">SEO-Score laut Google Lighthouse</span><span style="font-size:18px;font-weight:700;color:'+getScoreColor(factors.seo)+'">'+factors.seo+' / 100</span></div><div style="font-size:12px;color:var(--tx3);margin-bottom:4px">Technische Faktoren:</div>'+seoHtml+'</div></div>'+
    '<div class="r-panel" style="position:relative"><div class="r-ph gold">Was du konkret tun kannst</div>'+recsHtml+'<div style="position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,var(--bg2));display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;font-size:12px;color:var(--tx3)">Die vollst&auml;ndige Auswertung im pers&ouml;nlichen Gespr&auml;ch</div></div>'+
    '<div class="r-panel"><div class="r-ph gold">Auswertung nach Faktor</div><div style="padding:16px 18px">'+fRows+'</div></div>'+
    '<div class="cta-panel"><h2 class="cta-h">Wir bauen dir eine <span class="gold">kostenlose Demo</span><br>deiner neuen Website.</h2><p class="cta-p">In einem kurzen 15-Minuten-Gespr&auml;ch zeigen wir dir, wie deine Website aussehen und funktionieren k&ouml;nnte &ndash; fertig gebaut, keine Vorleistung. Wir brauchen daf&uuml;r nur ein paar Informationen von dir.</p>'+
    '<div id="email-form-section"><div class="email-form-wrap"><input class="e-inp" id="res-name" placeholder="Dein Name" autocomplete="name"><input class="e-inp" id="res-email" type="email" placeholder="deine@email.de" autocomplete="email"><button class="gbtn" onclick="submitEmail()" style="width:100%;padding:14px;font-size:14px">Analyse per Mail erhalten</button></div></div>'+
    '<div style="height:14px"></div>'+
    '<a href="https://calendly.com/jonas-ernst-goldenweb/30min" target="_blank" class="cal-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Jetzt unverbindliche Beratung sichern &rarr;</a>'+
    '<p class="cta-note">Kein Verkaufsgespr&auml;ch &middot; 15 Minuten &middot; Wir zeigen dir deine fertige Demo</p></div>'+
    '<div style="text-align:center;margin-top:20px"><button onclick="resetAll()" style="background:none;border:.5px solid var(--br);border-radius:8px;padding:8px 18px;color:var(--tx3);font-family:Cairo,sans-serif;font-size:13px;cursor:pointer">Neue Analyse starten</button></div>'+
    '<div style="text-align:center;margin-top:18px;padding-top:16px;border-top:.5px solid var(--br)"><a href="https://goldenweb.info/datenschutz" target="_blank" style="font-size:11px;color:var(--tx3);text-decoration:none;margin:0 10px">Datenschutz</a><a href="https://goldenweb.info/impressum" target="_blank" style="font-size:11px;color:var(--tx3);text-decoration:none;margin:0 10px">Impressum</a></div>';
  setTimeout(()=>{const el=document.getElementById('sc-fill-el');if(el)el.setAttribute('stroke-dasharray',fillD+' '+circ);},200);
}

function submitEmail(){
  const name=(document.getElementById('res-name')?.value||'').trim();
  const email=(document.getElementById('res-email')?.value||'').trim();
  if(!email){document.getElementById('res-email').style.borderColor='var(--red)';return;}
  // TODO: fetch('https://formspree.io/f/YOUR_ID',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,url:S.url,anfragen:S.anfragen,sichtbarkeit:S.sichtbarkeit,alter:S.alter,score:calcScore().total})});
  document.getElementById('email-form-section').innerHTML='<div style="background:rgba(94,196,122,.1);border:.5px solid rgba(94,196,122,.3);border-radius:10px;padding:14px 18px;font-size:14px;color:var(--grn);text-align:center">Deine Analyse wurde an <strong>'+email+'</strong> geschickt. Du erh&auml;ltst sie in wenigen Minuten.</div>';
}

function resetAll(){Object.assign(S,{url:'',branche:'',anfragen:'',sichtbarkeit:'',alter:'',psData:null,psDone:false,step:0});document.getElementById('results-ov').classList.add('hidden');document.getElementById('loading-ov').classList.add('hidden');document.getElementById('landing').style.display='';window.scrollTo(0,0);}

function toggleFaq(btn){const item=btn.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item.open').forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');}

</script>
